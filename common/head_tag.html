<script type="text/discourse-plugin" version="0.8">
    const { iconNode } = require("discourse-common/lib/icon-library");

    // Inject "Documents" icon in the header using `decorateWidget`
    api.decorateWidget("header:after", (helper) => {
        return helper.h("div.d-header-icons.doc-header-set", [
            helper.h(
                "a.icon.btn-flat.doc",
                {
                    href: "/docs",
                    title: "Documents",
                },
                [iconNode("book"), "Documents"]
            ),
        ]);
    });

    // Inject calendar status icon in the header using `decorateWidget`
    api.decorateWidget("header:after", (helper) => {
        let icon = "calendar";
        let title = "Open status: unknown";
        try {
            const cache = JSON.parse(settings.tool_status);
            const shutter = cache.tools[4];
            if (shutter.status) {
                icon = "calendar-check";
                title = "Open since " + shutter.date;
            } else {
                icon = "calendar-alt";
                title = "Closed since " + shutter.date;
            }
        } catch (e) {}

        return helper.h("div.d-header-icons.shutter-status", [
            helper.h(
                "a.icon",
                {
                    href: "/calendar",
                    title: title,
                },
                iconNode(icon)
            ),
        ]);
    });
</script>
