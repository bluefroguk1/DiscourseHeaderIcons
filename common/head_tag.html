<script type="text/discourse-plugin" version="0.8">
  const { iconNode } = require("discourse-common/lib/icon-library");
  const { createWidget } = require("discourse/widgets/widget");

  // Define the Documents button component
  const DocumentsButton = createWidget("documents-button", {
    tagName: "a.icon.btn-flat.doc",
    buildAttributes() {
      return {
        href: "/docs",
        title: "Documents",
      };
    },
    html() {
      return [iconNode("book"), "Documents"];
    },
  });

  // Add the Documents button to the header
  api.headerButtons.add("documents", DocumentsButton, { after: "home" });

  // Define the Shutter Status button component
  const ShutterStatusButton = createWidget("shutter-status-button", {
    tagName: "a.icon",
    buildAttributes() {
      let icon = "calendar";
      let title = "Open status: unknown";
      try {
        const cache = JSON.parse(settings.tool_status);
        const shutter = cache.tools[4];
        if (shutter.status) {
          icon = "calendar-check";
          title = "Open since " + shutter.date;
        } else {
          icon = "calendar-alt";
          title = "Closed since " + shutter.date;
        }
      } catch (e) {}
      return {
        href: "/calendar",
        title: title,
        class: `d-icon-${icon}`,
      };
    },
    html() {
      return iconNode(this.attrs.class.split("-")[1]);
    },
  });

  // Add the Shutter Status button to the header
  api.headerButtons.add("shutter-status", ShutterStatusButton, { after: "documents" });
</script>
