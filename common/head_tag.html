<script type="text/discourse-plugin" version="0.8">
    const { iconNode } = require("discourse-common/lib/icon-library");

    // Adding "Documents" icon using the new `headerIcons` API
    api.headerIcons((icons) => {
        icons.add("doc-header-set", "book", {
            title: "Documents",
            href: "/docs",
            class: "doc-header-set",
            text: "Documents"
        });
    });

    // Adding calendar status icon using `headerIcons` API
    api.headerIcons((icons) => {
        let icon = "calendar";
        let title = "Open status: unknown";
        try {
            const cache = JSON.parse(settings.tool_status);
            const shutter = cache.tools[4];
            if (shutter.status) {
                icon = "calendar-check";
                title = "Open since " + shutter.date;
            } else {
                icon = "calendar-alt";
                title = "Closed since " + shutter.date;
            }
        } catch (e) {}

        icons.add("shutter-status", icon, {
            title: title,
            href: "/calendar",
            class: "shutter-status"
        });
    });
</script>
